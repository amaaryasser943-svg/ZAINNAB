<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret Message</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
    overflow:hidden;
    color:white;
    font-family:'Poppins',sans-serif;
    height:100vh;
}

/* SCREEN */
.screen{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.hidden{ display:none; }

.question{
    color:#ff69b4;
    font-size:2rem;
    margin-bottom:30px;
}

.buttons{
    display:flex;
    gap:15px;
}

button{
    padding:12px 28px;
    border:none;
    border-radius:999px;
    cursor:pointer;
    font-size:1rem;
    font-weight:600;
}

.yes{ background:#ff69b4; color:white; }
.no{ background:white; color:#ff69b4; }

/* HEART */
.heart-wrapper{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

/* HEART STATIC */
.heart{
    width:260px;
    height:240px;
    background:white;
    transform:rotate(-45deg);
    position:relative;
    box-shadow:0 0 25px #fff,0 0 60px #fff;
    animation:none !important; /* ❌ no pulse */
}

.heart::before,
.heart::after{
    content:'';
    position:absolute;
    width:260px;
    height:240px;
    background:white;
    border-radius:50%;
}

.heart::before{ top:-130px; left:0; }
.heart::after{ left:130px; top:0; }

/* NAME FIXED */
.name-layer{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index:999;
    pointer-events:none;
}

.name{
    font-size:3rem;
    font-weight:700;
    color:#ff69b4;
    white-space:nowrap;
}

/* FADE BACKGROUND */
.fade-bg{
    opacity:0.08;
    transform:translate(-50%,-50%) scale(1.8);
}

/* MESSAGE */
.message{
    position:relative;
    max-width:800px;
    font-size:1.8rem;
    line-height:2;
    font-family:'Dancing Script',cursive;
    opacity:0;
    transition:1s;
}

.show{ opacity:1; }

/* NO RUN BUTTON FIX */
.no-run{
    position:absolute;
    transition:0.2s;
    z-index:1; /* لا يغطي YES */
}

</style>
</head>

<body>

<!-- FIRST SCREEN -->
<div id="firstScreen" class="screen">
    <h1 class="question">You have a secret message.<br>Would you like to view it?</h1>
    <div class="buttons">
        <button class="yes" onclick="showHeart()">Yes</button>
        <button class="no" onclick="noChoice(event)">No</button>
    </div>
</div>

<!-- NO SCREEN -->
<div id="noScreen" class="screen hidden">
    <h1 id="noText" class="question">You have no choice.<br>You must view the message.</h1>
    <div class="buttons">
        <button class="yes" onclick="showHeart()">Yes</button>
        <button id="noBtn" class="no" onclick="noChoice(event)">No</button>
    </div>
</div>

<!-- HEART SCREEN -->
<div id="heartScreen" class="screen hidden">

    <div id="heartWrap" class="heart-wrapper">
        <div class="heart"></div>

        <div class="name-layer">
            <div class="name">ZAINNAB</div>
        </div>
    </div>

    <div id="message" class="message"></div>

</div>

<script>

const text = `I'm sorry, my love.

I have never loved anyone the way I love you, and I never will.

I feel like you're still upset with me, and I couldn't think of a better way to make it up to you.

I pray that God brings us together soon in our home.

You are my wife, my sister, my love, my best friend, my little girl, the mother of my future children, and my whole world.

May God keep you by my side forever and always make you my support and everything I have.

Hopefully, we'll be together in our home very soon. ❤️`;

let i = 0;
let noCount = 0;

function typeWriter(){
    if(i < text.length){
        document.getElementById("message").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 35);
    }
}

function showHeart(){
    document.getElementById("firstScreen").classList.add("hidden");
    document.getElementById("noScreen").classList.add("hidden");
    document.getElementById("heartScreen").classList.remove("hidden");

    setTimeout(()=>{
        document.getElementById("heartWrap").classList.add("fade-bg");
    },3000);

    setTimeout(()=>{
        document.getElementById("message").classList.add("show");
        typeWriter();
    },5000);
}

function noChoice(e){

    noCount++;

    document.getElementById("firstScreen").classList.add("hidden");
    document.getElementById("noScreen").classList.remove("hidden");

    let msg = "You have no choice. You must view the message.";

    if(noCount === 2) msg += " 😡";
    if(noCount === 3) msg += " 😡😡";

    if(noCount >= 3){
        makeNoRun();
    }

    document.getElementById("noText").innerText = msg;
}

function makeNoRun(){
    const btn = document.getElementById("noBtn");

    btn.classList.add("no-run");

    document.addEventListener("mousemove", (e)=>{

        let rect = btn.getBoundingClientRect();

        let dx = e.clientX - (rect.left + rect.width/2);
        let dy = e.clientY - (rect.top + rect.height/2);

        let dist = Math.sqrt(dx*dx + dy*dy);

        if(dist < 120){

            let x = Math.random() * (window.innerWidth - 100);
            let y = Math.random() * (window.innerHeight - 100);

            btn.style.left = x + "px";
            btn.style.top = y + "px";

            btn.style.zIndex = "1";
        }
    });
}

</script>

</body>
</html>
